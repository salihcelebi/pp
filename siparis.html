<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sipariş Yönetimi</title>
  <style>
    body{font-family:Arial,sans-serif;background:#0f172a;color:#e2e8f0;margin:0;padding:20px}
    .wrap{max-width:1200px;margin:0 auto}
    .card{background:#111827;border:1px solid #334155;border-radius:12px;padding:14px;margin-bottom:12px}
    .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    input,select,button{height:36px;border-radius:8px;border:1px solid #475569;background:#0b1220;color:#e2e8f0;padding:0 10px}
    table{width:100%;border-collapse:collapse}
    th,td{border-bottom:1px solid #334155;padding:8px;text-align:left;font-size:13px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Sipariş Yönetimi</h1>
      <p>Başlangıç URL: <b>https://hesap.com.tr/p/sattigim-ilanlar</b></p>
      <div class="row">
        <select id="selSiparisStatus">
          <option value="all">Tüm Durumlar</option>
          <option value="pending">pending</option>
          <option value="processing">processing</option>
          <option value="completed">completed</option>
          <option value="cancelled">cancelled</option>
          <option value="returnprocess">returnprocess</option>
          <option value="problematic">problematic</option>
        </select>
        <input id="inpSiparisMaxPage" type="number" min="1" max="50" value="5" placeholder="Sayfa sayısı" />
        <input id="inpScanSpeed" type="number" min="1" max="100" value="3" placeholder="Hız" />
        <button id="btnSiparisStart" type="button">Tarama Başlat</button>
        <button id="btnSiparisStop" type="button">Durdur</button>
        <button id="btnSiparisClear" type="button">Temizle</button>
      </div>
      <div class="row" style="margin-top:8px">
        <button id="btnSiparisCopyMd" type="button">MD Kopyala</button>
        <button id="btnSiparisExportJson" type="button">JSON Export</button>
        <button id="btnSiparisExportCsv" type="button">CSV Export</button>
      </div>
      <p id="siparisStats">Toplam: 0 • Dedup atılan: 0 • Sayfa-başı son eklenen: 0 • Hız: 3x • Durum: beklemede</p>
    </div>

    <div class="card" style="overflow:auto;">
      <table>
        <thead><tr><th>İlan Başlığı</th><th>Sipariş No</th><th>SMM ID</th><th>Tarih</th><th>Durum</th><th>Tutar</th><th>Kullanıcı</th></tr></thead>
        <tbody id="tblSiparisBody"></tbody>
      </table>
      <div id="ordersEmpty">Henüz sipariş verisi yok.</div>
    </div>
  </div>

  <script src="siparis.js"></script>
</body>
</html>
